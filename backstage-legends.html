<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backstage Legends | VelvetVerse Radio</title>

  <style>
    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b0b0f;
      color:white;
      min-height:100vh;
      padding:20px;
    }

    .page{
      max-width:1100px;
      margin:0 auto;
      padding:30px;
    }

    .back-btn{
      display:inline-block;
      margin-bottom:25px;
      padding:10px 22px;
      border-radius:999px;
      background:#111827;
      color:white;
      text-decoration:none;
      border:1px solid #8555f7;
    }

    .hero{
      text-align:center;
      padding:45px 20px;
      border-radius:24px;
      background:linear-gradient(135deg,#1b102f,#0b0b0f,#2a0f1f);
      box-shadow:0 0 35px rgba(133,85,247,0.35);
    }

    .hero h1{
      font-size:42px;
      margin:0 0 12px;
    }

    .hero p{
      color:#d1d5db;
      font-size:18px;
    }

    .podcast-card{
      margin-top:35px;
      display:grid;
      grid-template-columns:260px 1fr;
      gap:25px;
      background:#111827;
      padding:25px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.12);
    }

    .podcast-cover{
      width:100%;
      border-radius:18px;
      background:#222;
    }

    .host-photo{
      width:90px;
      height:90px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #8555f7;
      margin-top:15px;
    }

    audio{
      width:100%;
      margin-top:20px;
    }

    @media(max-width:700px){
      .podcast-card{
        grid-template-columns:1fr;
      }

      .hero h1{
        font-size:32px;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <a class="back-btn" href="index.html">← Back to VelvetVerse Radio</a>

    <section class="hero">
      <h1>🎙️ Backstage Legends</h1>
      <p>Histórias reais, memórias e lendas por trás da música.</p>
    </section>

    <section class="podcast-card">

      <div>
        <img class="podcast-cover" src="logo.png" alt="Backstage Legends Cover">
        <img class="host-photo" src="logo.png" alt="Ricky Sousa">
      </div>

      <div>
        <h2>Primeiro Episódio</h2>
        <p><strong>Com Ricky Sousa</strong></p>
        <p>
          Neste episódio, entramos no backstage das grandes histórias,
          memórias e momentos que marcaram a música.
        </p>

        <audio controls>
          <source src="" type="audio/mpeg">
          O teu browser não suporta áudio.
        </audio>
      </div>

    </section>

  </div>

</body>
</html>
