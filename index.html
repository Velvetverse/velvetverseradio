<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VelvetVerse Radio | Live 24/7 Music</title>

<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
  overflow-y:auto;
  font-family:Arial,sans-serif;
  background:#0b0b0f;
  color:white;
}

.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:136px;
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  background:#0b0b0f;
  border-bottom:2px solid #a855f7;
  box-shadow:0 0 15px #a855f7;
  z-index:2000;
}

.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{width:60px;height:60px;border-radius:50%;}
.logo-main{color:#a855f7;font-weight:bold;font-size:18px;}
.logo-sub{font-size:11px;opacity:0.8;}

.player{flex:1;}
.player iframe{width:100%;height:115px;border:none;display:block;}

.listen-btn{
  padding:10px 18px;
  border-radius:26px;
  background:#0b0b0f;
  color:white;
  font-weight:bold;
  cursor:pointer;
  text-transform:uppercase;
  border:2px solid #a855f7;
  box-shadow:0 0 12px #a855f7;
}

.onair{
  background:red;
  padding:8px 12px;
  border-radius:18px;
  font-size:11px;
  font-weight:bold;
}

.history{width:360px;}
.history iframe{width:100%;height:100px;border:none;}

nav{
  position:fixed;
  top:134px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:12px;
  background:#111;
  padding:10px 0;
}

nav button{
  background:#0b0b0f;
  color:white;
  border:1px solid #a855f7;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
}

.main{
  margin-top:180px;
}

.section{display:none;}
.section.active{display:block;}

.panel{
  padding:40px 20px;
}

.panel-box{
  max-width:1000px;
  margin:auto;
  border:1px solid #a855f7;
  border-radius:16px;
  padding:35px;
}

.contact-form input,
.contact-form textarea{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #a855f7;
  background:#0b0b0f;
  color:white;
}

.contact-form button{
  padding:12px 24px;
  border-radius:26px;
  background:#a855f7;
  color:#000;
  border:none;
}

/* COMMENTS */
.approved-comments{
  display:grid;
  gap:20px;
}

.comment-card{
  display:flex;
  gap:15px;
  background:#111;
  padding:20px;
  border-radius:15px;
  border:1px solid #a855f7;
  box-shadow:0 0 20px rgba(168,85,247,0.6);
  transition:0.3s;
}

.comment-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 30px rgba(168,85,247,1);
}

.comment-card img{
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid #a855f7;
}

.comment-content strong{
  color:#a855f7;
  font-size:18px;
}

.comment-date{
  font-size:12px;
  opacity:0.6;
}

.footer{
  margin-top:40px;
  padding:20px;
  border-top:1px solid #a855f7;
  text-align:center;
}
</style>
</head>

<body>

<nav>
  <button onclick="show('home',this)">Home</button>
  <button onclick="show('comments',this)">Comments</button>
</nav>

<div class="main">

<div id="home" class="section active">
  <div class="panel-box">
    <h1>VelvetVerse Radio</h1>
    <p>Streaming 24/7</p>
  </div>
</div>

<div id="comments" class="section">
  <div class="panel-box">
    <h1>Comments</h1>

    <div class="approved-comments">

      <div class="comment-card">
        <img src="lurdes-ribeiro.png">
        <div class="comment-content">
          <strong>Lurdes Ribeiro</strong>
          <div class="comment-date">April 2026</div>
          <p>Uma rádio fantástica, com uma energia única. Parabéns pelo excelente trabalho!</p>
        </div>
      </div>

      <div class="comment-card">
        <img src="https://ui-avatars.com/api/?name=Liam+Thompson&background=0b0b0f&color=a855f7">
        <div class="comment-content">
          <strong>Liam Thompson</strong>
          <div class="comment-date">April 2026</div>
          <p>Amazing sound and great vibe. One of the best online radios I’ve heard.</p>
        </div>
      </div>

    </div>

  </div>
</div>

</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
